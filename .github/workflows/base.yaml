name: build-base
# This workflow is triggered manually (workflow_dispatch) and intentionally does
# NOT publish an action-base:latest tag.
#
# Background: users who pin to a specific action commit SHA are still affected
# by base image changes because GitHub Actions rebuilds the Docker image from
# the Dockerfile at that commit, which pulls whatever action-base:latest
# resolves to at build time. When we updated action-base:latest as part of the
# trixie migration, it broke all pinned users unexpectedly.
#
# Fix: the base image is now tagged with a Unix timestamp (e.g. action-base:1234567890)
# and the Dockerfile is updated to reference that specific tag. This ensures that
# pinning to an action commit SHA truly isolates users from future base image changes.
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      attestations: write
      id-token: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Generate tag
        id: tag
        run: echo "tag=$(date +%s)" >> $GITHUB_OUTPUT
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - 
        name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: 'v3.0.5'
      - 
        name: Extract metadata (tags, labels, annotations) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base
          annotations: |
            org.opencontainers.image.title=Terrateam Action Base
            org.opencontainers.image.description=Terrateam Action Base
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      -
        name: Build and push base
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          push: true
          file: Dockerfile.base
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:${{ steps.tag.outputs.tag }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - 
        name: Sign the published container image
        run: cosign sign ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:${{ steps.tag.outputs.tag }} --yes
      - 
        name: Verify container image signature
        run: |
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:${{ steps.tag.outputs.tag }} \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          --certificate-identity-regexp="https://github.com/${{ github.repository }}"
      - 
        name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true